<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light only"><title>Zuri</title></head>
<body style="margin:0;padding:0;background:#F7F0E6">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F7F0E6">
    <tr><td align="center" style="padding:32px 16px">
      <table role="presentation" width="540" cellpadding="0" cellspacing="0" style="width:540px;max-width:100%;background:#ffffff;border-radius:16px;border:1px solid #EBD9CF">
        <tr><td style="padding:32px 36px 16px;text-align:center">
          <img src="https://zuriafrica.app/logo-zuri-email-rose.png" alt="Zuri" width="132" style="display:inline-block;width:132px;height:auto;border:0;outline:none;text-decoration:none" />
        </td></tr>
        <tr><td style="padding:0 36px"><div style="height:1px;background:#f1e8da;line-height:1px;font-size:0">&nbsp;</div></td></tr>
        <tr><td style="padding:22px 36px 34px">
          <h1 style="margin:0 0 14px;font-family:Georgia,'Times New Roman',serif;font-size:22px;line-height:1.3;color:#2A1A12;font-weight:700">Confirme ton inscription</h1>
          <div style="font-family:Helvetica,Arial,sans-serif;font-size:15px;line-height:1.65;color:#5a4a3e"><p style="margin:0 0 8px">Bienvenue sur Zuri&nbsp;! Il ne reste qu'une étape&nbsp;: confirme ton adresse email pour activer ton compte.</p></div>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:26px auto 4px"><tr><td align="center" style="border-radius:14px;background:#2A1A12"><a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:13px 30px;font-family:Helvetica,Arial,sans-serif;font-size:15px;font-weight:700;color:#F7F0E6;text-decoration:none;border-radius:14px">Confirmer mon email</a></td></tr></table>
          <p style="margin:18px 0 0;font-family:Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#9b8a7c">Si le bouton ne fonctionne pas, copie-colle ce lien&nbsp;:<br/><a href="{{ .ConfirmationURL }}" style="color:#E2B0A0;word-break:break-all">{{ .ConfirmationURL }}</a></p>
        </td></tr>
      </table>
      <p style="margin:18px auto 0;max-width:540px;font-family:Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#a9988a;text-align:center">
        Zuri — la beauté près de chez toi.<br/>
        <a href="https://zuriafrica.app" style="color:#E2B0A0;text-decoration:none">zuriafrica.app</a>
      </p>
    </td></tr>
  </table>
</body></html>
